services:
  # SQL Server Database
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: projecttracker-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Express
    ports:
      - "127.0.0.1:1435:1433"
    volumes:
      - sql-data:/var/opt/mssql
      - C:\Backups\ProjectTrackerDB:/var/opt/mssql/backup
    networks:
      - projecttracker-network
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -C -Q "SELECT 1" -b -o /dev/null
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '4.0'

  # ASP.NET Core Backend with AI assistant
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: projecttracker-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5143
      - JwtSettings__SecretKey=YourSuperSecretKeyForJWTTokenGenerationThatIsLongEnough123456!
      - ConnectionStrings__DefaultConnection=Server=database;Database=ProjectTrackerDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=true;
      - ConnectionStrings__AzureConnection=Server=tcp:pharmacare.database.windows.net,1433;Initial Catalog=PharmaCare;User ID=pharmacare_admin;Password=Pass@123;Encrypt=True;TrustServerCertificate=True;Connection Timeout=60;
      - KnowledgeBase__DocumentsPath=/app/kb-docs
      - DocumentsPath=/app/documents
      - NasSettings__Host=192.168.11.186
      - NasSettings__ShareName=NewAge_Tech
      - NasSettings__Username=Storage
      - NasSettings__Password=AccMed@2025
      - Ollama__BaseUrl=http://host.docker.internal:11434
      - Ollama__Model=phi3:mini
      - Ollama__Enabled=false
      - Claude__ApiKey=${CLAUDE_API_KEY:-}
      - Claude__Model=claude-sonnet-4-20250514
      - Claude__Enabled=true
      - LocalLlm__BaseUrl=http://host.docker.internal:8090
      - LocalLlm__Model=qwen2.5-14b-instruct
      - LocalLlm__Enabled=true
      - SearXNG__BaseUrl=http://searxng:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "0.0.0.0:5143:5143"
    volumes:
      - ./kb-docs:/app/kb-docs
      - ./ai-data:/app/ai-data
      - nas-documents:/app/documents
      - ./uploads:/app/uploads
    depends_on:
      database:
        condition: service_healthy
      searxng:
        condition: service_started
    networks:
      - projecttracker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5143/api/aichat/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '4.0'

  # SearXNG - Self-hosted web search engine for Welly
  searxng:
    image: searxng/searxng:latest
    container_name: projecttracker-searxng
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    ports:
      - "127.0.0.1:8888:8080"
    networks:
      - projecttracker-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  # Angular Frontend
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: projecttracker-frontend
    ports:
      - "0.0.0.0:4200:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - projecttracker-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '1.0'

volumes:
  sql-data:
    driver: local
  nas-documents:
    driver: local
    driver_opts:
      type: cifs
      device: "//192.168.11.186/WorkSpace/IntranetDocuments"
      o: "username=Storage,password=AccMed@2025,vers=3.0,uid=1000,gid=1000"
networks:
  projecttracker-network:
    driver: bridge
